name: Deploy Polaris to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: polaris-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ポラリス英文法ファイナル演習1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate runtime config
        run: node scripts/write-config.mjs
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Generate reading runtime config
        working-directory: reading
        run: node scripts/write-config.mjs
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static files
        run: |
          mkdir -p ../_site
          cp index.html ../_site/
          cp admin.html ../_site/
          cp robots.txt ../_site/
          cp -r data ../_site/data
          cp -r static ../_site/static
          cp -r ../grammar-knowledge-check ../_site/grammar-knowledge-check
          cp -r ../reading ../_site/reading
          touch ../_site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
