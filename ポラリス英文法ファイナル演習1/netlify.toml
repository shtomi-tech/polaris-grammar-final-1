[build]
  command = "node scripts/write-config.mjs"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/static/config.json"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "no-store"
